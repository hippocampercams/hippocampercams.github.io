<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hippocampercams • digicams & film</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="https://static.tumblr.com/fpdiq1j/N3Zmkjmqn/theme_generic.css">

    <style>
        @font-face {
            font-family: "Mouse Deco";
            src: url("Mouse_Deco.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            background: #008080;
            margin: 0;
            font: normal 13px/1.3 "Mouse Deco", Arial, sans-serif;
            overflow-x: hidden;
            overflow-y: visible;
        }

        body.mobile-menu-open {
            overflow: hidden;
        }

        a {
            color: #000000;
            text-decoration: none;
            font-family: "Mouse Deco", Arial, sans-serif;
        }

        a:hover {
            text-decoration: underline;
        }

        button,
        input,
        textarea,
        select,
        summary,
        p,
        div,
        span,
        label {
            font-family: "Mouse Deco", Arial, sans-serif;
        }

        .wrapper {
            position: relative;
            width: 100%;
            min-height: 100vh;
            overflow: visible;
            z-index: 1;
            padding-bottom: 40px;
            box-sizing: border-box;
        }

        .desktop-stage-shell {
            position: relative;
            width: 100%;
            min-height: calc(100vh - 28px);
            overflow: visible;
        }

        .desktop-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 1792px;
            transform-origin: top left;
        }

        .icons {
            margin: 0;
            list-style-type: none;
            padding: 0;
            width: 116px;
            position: absolute;
            top: 48px;
            left: 10px;
            z-index: 2;
            font-family: "Mouse Deco" !important;
        }

        .icons a {
            color: #ffffff;
            text-decoration: none;
            display: block;
            margin-bottom: 19px;
        }

        .icons .my_computer,
        .icons .my_documents,
        .icons .network_neighborhood,
        .icons .recycle_bin,
        .icons .folder,
        .icons .icon-img {
            transform: scale(1.08);
            transform-origin: center top;
        }

        .icon_label {
            font-family: "Mouse Deco" !important;
            font-size: 13px;
            letter-spacing: 0.005em;
            padding-top: 9px;
            color: #ffffff;
            text-align: center;
        }

        .my_computer, .my_documents, .network_neighborhood, .folder,
        .recycle_bin, .start_menu, .application_icons,
        .start_bar .start_button .logo, .start_bar .tray .calendar,
        .start_menu, .description .top, .description .ok_button, .description .bottom {
            background-image: url('https://static.tumblr.com/fpdiq1j/O6Um4f3al/master_sprite.png');
            margin: auto;
        }

        .my_computer {
            height: 32px;
            width: 32px;
            background-position: -616px -157px;
        }

        .my_documents {
            height: 30px;
            width: 32px;
            background-position: -616px -189px;
        }

        .network_neighborhood {
            height: 32px;
            width: 32px;
            background-position: -616px -219px;
        }

        .recycle_bin {
            height: 32px;
            width: 30px;
            background-position: -616px -251px;
        }

        .folder {
            height: 27px;
            width: 32px;
            background-position: -616px -283px;
        }

        .icon-img {
            display: block;
            width: 32px;
            height: 32px;
            margin: 0 auto;
            image-rendering: pixelated;
        }

        #desktop {
            position: absolute;
            top: 48px;
            left: 166px;
            width: 1120px;
            max-width: 1120px;
            min-width: 1120px;
            margin: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .window {
            width: 1120px;
            max-width: 1120px;
            min-width: 1120px;
            margin: 0;
            font-family: "Mouse Deco", Arial, sans-serif;
            background: #ffffff;
            border: 1px solid #000000;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        .window .title,
        .window .title p,
        .window .content,
        .window .content p,
        .window .content a,
        .window .content b,
        .window .content i,
        .window .content u,
        .window .caption,
        .window .caption p,
        .window .info,
        .window .post-actions,
        .window .condition-details,
        .window .condition-details summary,
        .window .condition-body,
        .window .condition-body p,
        .window .adopt-button,
        .window .tagline,
        .window .tagline p {
            font-family: "Mouse Deco" !important;
        }

        .post-tag-links,
        .post-tag-links p,
        .post-tag-links a,
        .post-tag-links u,
        .post-tag-links span {
            font-family: "Mouse Deco" !important;
        }

        .window .top,
        .window .middle,
        .window .bottom {
            background-image: none !important;
        }

        .window .top {
            height: 30px;
            background: linear-gradient(to right, #0a3a8b, #4f80d4) !important;
            border-bottom: 1px solid #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px 0 8px;
            box-sizing: border-box;
            color: #ffffff;
            position: relative;
        }

        .window .top::after {
            content: "x";
            width: 16px;
            height: 14px;
            background-color: #d4d0c8;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            text-align: center;
            line-height: 12px;
            color: #000000;
            font-size: 10px;
            box-sizing: border-box;
            display: inline-block;
            flex: 0 0 auto;
            font-family: "Mouse Deco";
        }

        .window .top .info {
            position: static;
            width: auto;
            z-index: auto;
            font-size: 11px;
            line-height: 1;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 8px;
        }

        .window > a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        .window .middle {
            background: #ffffff !important;
            padding: 16px 18px 18px 18px;
            box-sizing: border-box;
        }

        .window .content {
            background: #ffffff !important;
        }

        .window .bottom {
            height: 0;
            border: 0;
            background: transparent !important;
        }

        .title {
            display: block;
            font-size: 1.2em;
            line-height: 1.15;
            margin-bottom: 10px;
        }

        .caption {
            margin-bottom: 10px;
        }

        .middle .caption {
            margin-top: 8px;
        }

        .content p {
            margin: 0 0 10px;
        }

        .tagline {
            margin-top: 10px;
            font-size: 12px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 12px;
        }

        .photo-grid img.full_image {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            display: block;
            margin: 0;
            cursor: pointer;
            background: #f3f3f3;
        }

        img.full_image {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            cursor: pointer;
        }

        .post-actions {
            margin-top: 14px;
        }

        .condition-details {
            width: 100%;
            margin: 0 0 12px 0;
            background: #d4d0c8;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            box-sizing: border-box;
        }

        .condition-details summary {
            list-style: none;
            cursor: pointer;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: bold;
            position: relative;
            user-select: none;
        }

        .condition-details summary::-webkit-details-marker {
            display: none;
        }

        .condition-details summary::after {
            content: "▼";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            font-weight: normal;
            font-family: "Mouse Deco";
        }

        .condition-details[open] summary::after {
            content: "▲";
        }

        .condition-body {
            padding: 2px 10px 10px 10px;
            font-size: 12px;
            line-height: 1.35;
            border-top: 1px solid #808080;
        }

        .condition-body p:last-child {
            margin-bottom: 0;
        }

        .adopt-wrap {
            text-align: center;
        }

        .adopt-button {
            display: inline-block;
            min-width: 280px;
            padding: 6px 18px;
            background-color: #d4d0c8;
            color: #000000;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            box-sizing: border-box;
        }

        .adopt-button:active {
            border-top: 1px solid #404040;
            border-left: 1px solid #404040;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        .right-popups {
            position: fixed;
            top: 48px;
            left: 1326px;
            width: 450px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: stretch;
            pointer-events: none;
            transform-origin: top left;
        }

        .top-banner {
            pointer-events: auto;
            flex: 0 0 auto;
        }

        .top-banner-window {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #000000;
            background-color: #d4d0c8;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
            color: #000000;
        }

        .tb-titlebar {
            height: 30px;
            background: linear-gradient(to right, #0a3a8b, #4f80d4);
            border-bottom: 1px solid #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
            box-sizing: border-box;
            color: #ffffff;
            font-size: 11px;
        }

        .tb-title-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: "Mouse Deco";
            font-size: 18px;
            font-weight: bold;
        }

        .tb-close {
            width: 16px;
            height: 14px;
            background-color: #d4d0c8;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            text-align: center;
            line-height: 12px;
            color: #000000;
            font-size: 10px;
            cursor: default;
            box-sizing: border-box;
            font-family: "Mouse Deco";
        }

        .tb-body {
            display: flex;
            align-items: center;
            padding: 18px 18px 12px;
            box-sizing: border-box;
        }

        .tb-icon {
            position: relative;
            width: 36px;
            height: 32px;
            margin-right: 14px;
            background: none;
            flex: 0 0 auto;
        }

        .tb-icon::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 26px solid #ffff00;
        }

        .tb-icon::after {
            content: "!";
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            line-height: 1;
        }

        .tb-text,
        .tb-text p,
        .tb-text a,
        .tb-text b,
        .tb-text i,
        .tb-text u {
            font-family: "Mouse Deco" !important;
            font-size: 14px;
            line-height: 1.3;
            letter-spacing: 0.005em;
            box-sizing: border-box;
        }

        .tb-text p {
            margin-top: 0;
        }

        .tb-footer {
            padding: 0 18px 10px;
            margin-top: -10px;
            text-align: center;
            box-sizing: border-box;
        }

        .tb-button {
            font-size: 15px;
            font-weight: bold;
            min-width: 75px;
            padding: 2px 10px;
            background-color: #d4d0c8;
            border-top: 1px solid #ffffff;
            border-left: 1px solid #ffffff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            font-family: "Mouse Deco" !important;
        }

        .tb-button:active {
            border-top: 1px solid #404040;
            border-left: 1px solid #404040;
            border-right: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        .start_bar {
            position: fixed;
            background-color: rgb(192,192,192);
            left: 0;
            right: 0;
            bottom: 0;
            height: 28px;
            z-index: 1000;
        }

        .taskbar-center-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: "Mouse Deco";
            font-size: 12px;
            color: #000000;
            line-height: 1;
            white-space: nowrap;
            pointer-events: none;
        }

        .start_menu {
            position: absolute;
            z-index: 3;
            bottom: 28px;
            display: none;
        }

        .start_bar .top_border {
            border-bottom: 1px solid rgb(255,255,255);
            border-top: 1px solid rgb(223,223,223);
        }

        .start_bar .start_button {
            float: left;
            border-top: 2px solid white;
            border-left: 2px solid white;
            border-bottom: 2px solid gray;
            border-right: 2px solid gray;
            height: 18px;
            width: 54px;
            margin-left: 2px;
            margin-top: 2px;
        }

        .start_bar .start_button .text {
            float: right;
            display: inline;
            margin-right: 4px;
            line-height: 18px;
            font-weight: bold;
            font-family: "Mouse Deco";
        }

        .start_bar .start_button .logo {
            float: left;
            margin-top: 2px;
            margin-left: 2px;
            width: 16px;
            height: 14px;
            background-position: -633px -103px;
        }

        .start_bar .big_seperator {
            float: left;
            border-left: 1px solid rgb(128,128,128);
            border-right: 1px solid rgb(255,255,255);
            height: 22px;
            margin-top: 2px;
            margin-left: 2px;
        }

        .start_bar .small_seperator {
            float: left;
            border-left: 1px solid rgb(255,255,255);
            border-top: 1px solid rgb(255,255,255);
            border-right: 1px solid rgb(128,128,128);
            border-bottom: 1px solid rgb(128,128,128);
            background-color: rgb(192,192,192);
            width: 1px;
            height: 16px;
            margin-top: 4px;
            margin-left: 2px;
        }

        .start_bar .application_icons {
            float: left;
            margin-top: 5px;
            margin-left: 7px;
            margin-right: 7px;
            height: 16px;
            width: 84px;
            background-position: -565px -69px;
        }

        .start_bar .tray {
            float: right;
            border-top: 1px solid rgb(128,128,128);
            border-left: 1px solid rgb(128,128,128);
            border-bottom: 1px solid rgb(255,255,255);
            border-right: 1px solid rgb(255,255,255);
            height: 18px;
            width: 79px;
            margin-right: 5px;
            margin-top: 2px;
        }

        .start_bar .tray .time {
            line-height: 18px;
            float: right;
            font-size: 10px;
            margin-right: 10px;
            font-family: "Mouse Deco";
        }

        .start_bar .tray .calendar {
            float: left;
            margin-top: 1px;
            margin-left: 3px;
            width: 16px;
            height: 16px;
            background-position: -632px -87px;
        }

        #hpc-lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #hpc-lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
            display: block;
        }

        .mobile-menu-button {
            display: none;
        }

        .mobile-menu-overlay {
            display: none;
        }

        @media (max-width: 900px) {
            body {
                overflow-x: hidden;
                overflow-y: auto;
            }

            .wrapper {
                padding-bottom: 0;
                overflow: visible;
            }

            .desktop-stage-shell {
                position: static;
                min-height: 0;
                overflow: visible;
            }

            .desktop-stage {
                position: static;
                width: auto;
                height: auto !important;
                transform: none !important;
            }

            .icons {
                display: none;
            }

            .right-popups {
                display: none;
                transform: none !important;
                top: auto !important;
                left: auto !important;
            }

            #desktop {
                position: static;
                margin: 8px 8px 52px 8px;
                width: calc(100vw - 16px);
                max-width: calc(100vw - 16px);
                min-width: 0;
                gap: 8px;
            }

            .window {
                width: calc(100vw - 16px);
                max-width: calc(100vw - 16px);
                min-width: 0;
                box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
            }

            .window .middle {
                padding: 10px 10px 12px 10px;
            }

            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0;
                margin-bottom: 8px;
            }

            .photo-grid img.full_image {
                aspect-ratio: 1 / 1;
                object-fit: cover;
            }

            .condition-details {
                width: 100%;
            }

            .adopt-button {
                min-width: 0;
                width: 100%;
            }

            .start_bar {
                display: none;
            }

            .mobile-menu-button {
                position: fixed;
                left: 8px;
                bottom: 8px;
                z-index: 10020;
                display: block;
                text-decoration: none;
                color: #ffffff;
                width: 48px;
            }

            .mobile-menu-button .folder {
                margin: 0 auto;
            }

            .mobile-menu-button .icon_label {
                padding-top: 4px;
                font-size: 12px;
            }

            .mobile-menu-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: 10030;
                display: none;
            }

            .mobile-menu-overlay.is-open {
                display: block;
            }

            .mobile-menu-panel {
                position: absolute;
                inset: 0 auto 0 0;
                width: 170px;
                max-width: 80vw;
                background: #008080;
                padding: 12px 10px 16px 10px;
                box-sizing: border-box;
                overflow-y: auto;
            }

            .mobile-menu-header {
                display: flex;
                justify-content: flex-end;
                margin-bottom: 12px;
            }

            .mobile-menu-close {
