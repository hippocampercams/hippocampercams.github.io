    <!-- CONFIRM POP-UP -->
    <div id="confirmOverlay" class="confirm-overlay" aria-hidden="true">
        <div class="confirm-popup" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <div class="confirm-titlebar">
                <span id="confirmTitle" class="confirm-titletext">PLEASE READ BEFORE PURCHASE</span>
                <span class="confirm-closefake">x</span>
            </div>

            <div class="confirm-content">
                <p><b>before you submit your order:</b></p>
                <p>please acknowledge the following:</p>

                <div class="confirm-checks">
                    <label class="confirm-check">
                        <input type="checkbox" class="confirm-required">
                        <span>i have read the item's description & the <u><a href="https://hippocampercams.github.io/readme.html" target="_blank" rel="noopener" style="color:#001BFF;">"READ ME"</a></u> page carefully and acknowledge their contents.</span>
                    </label>

                    <label class="confirm-check">
                        <input type="checkbox" class="confirm-required">
                        <span>cams are marked 'functional' once power-on, basic shooting, flash, zoom & playback are confirmed; <b>no other functions are guaranteed.</b></span>
                    </label>
 
                    <label class="confirm-check">
                        <input type="checkbox" class="confirm-required">
                        <span>all cams are vintage, pre-loved & have signs of age/wear e.g. scuffs, scratches, marks on screens, dust in corners or viewfinders, yellowing plastic/rubber etc. & deteriorated rubber caps are removed. i accept these and any visible major defects described in the listing.</span>
                    </label>

                    <label class="confirm-check">
                        <input type="checkbox" class="confirm-required">
                        <span>i understand that refunds & returns are not accepted subject to the <u><a href="https://hippocampercams.github.io/readme.html" target="_blank" rel="noopener" style="color:#001BFF;">"return/refund policy"</a></u>.</span>
                    </label>
                    
                    <label class="confirm-check">
                        <input type="checkbox" class="confirm-required">
                        <span>i understand that after i click <u><b>got it!</b></u>, my form will be submitted & hippocampercams will contact me via my preferred method of contact for this order and promotional material.</span>
                    </label>
                </div>

                <p>thank you so much for adopting from hippocampercams ♡</p>
                <div id="confirmError" class="confirm-error">please tick all boxes before continuing.</div>
            </div>

            <div class="confirm-bottom">
                <button type="button" id="confirmSubmit" class="confirm-button">got it!</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var params = new URLSearchParams(window.location.search);

            var camName = params.get("newbaby");
            if (camName) {
                var babyField = document.getElementById("baby_link");
                if (babyField) {
                    babyField.value = camName;
                }
            }

            if (params.get("submitted") === "1") {
                alert(
                    "PLEASE NOTE YOUR ORDER IS NOT CONFIRMED YET\n" +
                    "please look out for our message to you via your preferred method of contact\n" +
                    "THANK YOU FOR YOUR ORDER ♡"
                );

                var cleanUrl = window.location.origin + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }

            var form = document.getElementById("adoptForm");
            var openConfirm = document.getElementById("openConfirm");
            var confirmOverlay = document.getElementById("confirmOverlay");
            var confirmSubmit = document.getElementById("confirmSubmit");
            var confirmChecks = document.querySelectorAll(".confirm-required");
            var confirmError = document.getElementById("confirmError");

            if (openConfirm && confirmOverlay) {
                openConfirm.addEventListener("click", function () {
                    if (!form.checkValidity()) {
                        form.reportValidity();
                        return;
                    }
                    confirmError.classList.remove("show");
                    confirmOverlay.classList.add("is-open");
                    confirmOverlay.setAttribute("aria-hidden", "false");
                });
            }

            confirmChecks.forEach(function (checkbox) {
                checkbox.addEventListener("change", function () {
                    var allChecked = Array.prototype.every.call(confirmChecks, function (item) {
                        return item.checked;
                    });
                    if (allChecked) {
                        confirmError.classList.remove("show");
                    }
                });
            });

            if (confirmSubmit) {
                confirmSubmit.addEventListener("click", function () {
                    var allChecked = Array.prototype.every.call(confirmChecks, function (item) {
                        return item.checked;
                    });

                    if (!allChecked) {
                        confirmError.classList.add("show");
                        return;
                    }

                    confirmOverlay.classList.remove("is-open");
                    confirmOverlay.setAttribute("aria-hidden", "true");
                    form.submit();
                });
            }
        });
    </script>
