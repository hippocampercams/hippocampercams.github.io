<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OOPSIES</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="favicon.ico">

    <style>
        @font-face {
            font-family: "Mouse Deco";
            src: url("Mouse_Deco.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000000;
        }

        body {
            position: relative;
            font-family: "Mouse Deco", Arial, sans-serif;
        }

        a {
            text-decoration: none;
        }

        .desktop-stage {
            position: absolute;
            inset: 0;
            background: #000000;
            overflow: hidden;
        }

        .dvd-text {
            position: fixed;
            left: 0;
            top: 0;
            display: inline-block;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            will-change: transform;
            font-family: "Arial Black", Impact, "Trebuchet MS", Arial, sans-serif;
            font-size: 46px;
            line-height: 1;
            letter-spacing: 0.01em;
            color: #dfffe6;
            text-shadow:
                0 0 1px rgba(255,255,255,0.8),
                1px 1px 0 #c8f5d5,
                2px 2px 0 #9fd8b4,
                3px 3px 0 #6ea885,
                4px 4px 0 #3f6750,
                5px 5px 0 #1d3025,
                0 0 10px rgba(184, 255, 214, 0.25);
        }

        .back-link-desktop {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        .silver-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 320px;
            min-height: 64px;
            padding: 0 28px;
            border-radius: 999px;
            background: linear-gradient(to bottom, #fafafa 0%, #d8d8d8 28%, #bababa 52%, #ececec 100%);
            border: 2px solid #8a8a8a;
            box-shadow:
                inset 0 2px 0 rgba(255,255,255,0.95),
                inset 0 -3px 0 rgba(120,120,120,0.5),
                0 3px 0 rgba(90,90,90,0.85),
                0 0 0 1px rgba(255,255,255,0.15);
            color: #000000;
            font-family: "Arial Black", "Trebuchet MS", Arial, sans-serif;
            font-size: 22px;
            line-height: 1.1;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
        }

        .silver-button:hover {
            filter: brightness(1.04);
        }

        .silver-button:active {
            transform: translateY(2px);
            box-shadow:
                inset 0 2px 0 rgba(255,255,255,0.9),
                inset 0 -2px 0 rgba(120,120,120,0.45),
                0 1px 0 rgba(90,90,90,0.85),
                0 0 0 1px rgba(255,255,255,0.15);
        }

        .mobile-stage {
            display: none;
        }

        @media (max-width: 900px) {
            .desktop-stage {
                display: none;
            }

            .mobile-stage {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 24px 20px;
                box-sizing: border-box;
                background: #000000;
                text-align: center;
            }

            .mobile-text {
                max-width: 100%;
                margin-bottom: 28px;
                font-family: "Arial Black", Impact, "Trebuchet MS", Arial, sans-serif;
                font-size: 34px;
                line-height: 1.1;
                letter-spacing: 0.01em;
                color: #dfffe6;
                text-shadow:
                    0 0 1px rgba(255,255,255,0.8),
                    1px 1px 0 #c8f5d5,
                    2px 2px 0 #9fd8b4,
                    3px 3px 0 #6ea885,
                    4px 4px 0 #3f6750,
                    5px 5px 0 #1d3025,
                    0 0 10px rgba(184, 255, 214, 0.25);
            }

            .back-link-mobile {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .silver-button {
                min-width: 0;
                width: 100%;
                max-width: 320px;
                min-height: 58px;
                padding: 0 22px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="desktop-stage" id="desktopStage">
        <div class="dvd-text" id="dvdText">our bad... nothing here yet!</div>
        <a href="https://hippocampercams.github.io" class="back-link-desktop">
            <span class="silver-button">back to hippocampercams</span>
        </a>
    </div>

    <div class="mobile-stage">
        <div class="mobile-text">our bad... nothing here yet!</div>
        <a href="https://hippocampercams.github.io" class="back-link-mobile">
            <span class="silver-button">back to hippocampercams</span>
        </a>
    </div>

    <script>
        (function () {
            var mediaQuery = window.matchMedia("(max-width: 900px)");
            if (mediaQuery.matches) return;

            var text = document.getElementById("dvdText");
            if (!text) return;

            var x = 120;
            var y = 100;
            var dx = 1.55;
            var dy = 1.22;
            var angle = -28;

            function getBounds() {
                return text.getBoundingClientRect();
            }

            function applyPosition() {
                text.style.transform = "translate(" + x + "px, " + y + "px) rotate(" + angle + "deg)";
            }

            function clampIntoView() {
                applyPosition();

                var rect = getBounds();
                var overflowLeft = rect.left;
                var overflowTop = rect.top;
                var overflowRight = rect.right - window.innerWidth;
                var overflowBottom = rect.bottom - window.innerHeight;

                if (overflowLeft < 0) {
                    x += -overflowLeft;
                }
                if (overflowTop < 0) {
                    y += -overflowTop;
                }
                if (overflowRight > 0) {
                    x -= overflowRight;
                }
                if (overflowBottom > 0) {
                    y -= overflowBottom;
                }

                applyPosition();
            }

            function animate() {
                x += dx;
                y += dy;
                applyPosition();

                var rect = getBounds();
                var hitX = false;
                var hitY = false;

                if (rect.left <= 0 && dx < 0) {
                    dx = Math.abs(dx);
                    hitX = true;
                } else if (rect.right >= window.innerWidth && dx > 0) {
                    dx = -Math.abs(dx);
                    hitX = true;
                }

                if (rect.top <= 0 && dy < 0) {
                    dy = Math.abs(dy);
                    hitY = true;
                } else if (rect.bottom >= window.innerHeight && dy > 0) {
                    dy = -Math.abs(dy);
                    hitY = true;
                }

                if (hitX || hitY) {
                    angle = -angle;
                    clampIntoView();
                }

                requestAnimationFrame(animate);
            }

            window.addEventListener("resize", clampIntoView);
            window.addEventListener("orientationchange", clampIntoView);

            clampIntoView();
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
