<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OOPSIES</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="favicon.ico">

    <style>
        @font-face {
            font-family: "Mouse Deco";
            src: url("Mouse_Deco.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000000;
        }

        body {
            position: relative;
        }

        a {
            text-decoration: none;
        }

        .desktop-stage {
            position: absolute;
            inset: 0;
            background: #000000;
            overflow: hidden;
        }

        .dvd-text {
            position: fixed;
            left: 0;
            top: 0;
            display: inline-block;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            will-change: transform;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 72px;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.04em;
            color: #f2eeee;
            text-transform: none;
            text-shadow:
                -1px -1px 0 #ffffff,
                1px -1px 0 #d7d2d2,
                -1px 1px 0 #8a7f7f,
                1px 1px 0 #5f5454,
                2px 2px 0 #4a4040,
                3px 3px 0 #3a3131,
                4px 4px 0 #2e2626,
                5px 5px 0 #241d1d,
                6px 6px 0 #1a1414,
                7px 7px 0 #120d0d,
                10px 0 14px rgba(120, 40, 40, 0.35),
                -10px 0 14px rgba(120, 40, 40, 0.2);
            transform-origin: center center;
        }

        .back-link-desktop {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        .pixel-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 320px;
            min-height: 76px;
            padding: 0 26px;
            box-sizing: border-box;
            background: #47e34d;
            border: 6px solid #000000;
            border-radius: 0;
            box-shadow:
                inset 0 6px 0 #8cff90,
                inset -6px 0 0 #1d8d26,
                inset 0 -8px 0 #14801d,
                inset 6px 0 0 #8cff90,
                6px 6px 0 #000000;
            color: #000000;
            font-family: "Mouse Deco", "Arial Black", Arial, sans-serif;
            font-size: 26px;
            line-height: 1;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            image-rendering: pixelated;
            text-transform: uppercase;
        }

        .pixel-button:active {
            transform: translate(3px, 3px);
            box-shadow:
                inset 0 6px 0 #8cff90,
                inset -6px 0 0 #1d8d26,
                inset 0 -8px 0 #14801d,
                inset 6px 0 0 #8cff90,
                3px 3px 0 #000000;
        }

        .button-label {
            display: inline-block;
            transform: translateY(1px);
            white-space: nowrap;
        }

        .mobile-stage {
            display: none;
        }

        .mobile-text {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 900;
            color: #f2eeee;
            text-shadow:
                -1px -1px 0 #ffffff,
                1px -1px 0 #d7d2d2,
                -1px 1px 0 #8a7f7f,
                1px 1px 0 #5f5454,
                2px 2px 0 #4a4040,
                3px 3px 0 #3a3131,
                4px 4px 0 #2e2626,
                5px 5px 0 #241d1d,
                6px 6px 0 #1a1414,
                7px 7px 0 #120d0d,
                10px 0 14px rgba(120, 40, 40, 0.35),
                -10px 0 14px rgba(120, 40, 40, 0.2);
        }

        @media (max-width: 900px) {
            .desktop-stage {
                display: none;
            }

            .mobile-stage {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 24px 20px;
                box-sizing: border-box;
                background: #000000;
                text-align: center;
            }

            .mobile-text {
                max-width: 100%;
                margin-bottom: 32px;
                font-size: 34px;
                line-height: 1.05;
                letter-spacing: -0.04em;
            }

            .pixel-button {
                min-width: 0;
                width: auto;
                max-width: 100%;
                min-height: 62px;
                padding: 0 18px;
                font-size: 18px;
                border-width: 5px;
                box-shadow:
                    inset 0 5px 0 #8cff90,
                    inset -5px 0 0 #1d8d26,
                    inset 0 -7px 0 #14801d,
                    inset 5px 0 0 #8cff90,
                    5px 5px 0 #000000;
            }
        }
    </style>
</head>
<body>
    <div class="desktop-stage" id="desktopStage">
        <div class="dvd-text" id="dvdText">our bad... nothing here yet!</div>
        <a href="https://hippocampercams.github.io" class="back-link-desktop">
            <span class="pixel-button"><span class="button-label">back to hippocampercams</span></span>
        </a>
    </div>

    <div class="mobile-stage">
        <div class="mobile-text">our bad... nothing here yet!</div>
        <a href="https://hippocampercams.github.io">
            <span class="pixel-button"><span class="button-label">back to hippocampercams</span></span>
        </a>
    </div>

    <script>
        (function () {
            var mediaQuery = window.matchMedia("(max-width: 900px)");
            if (mediaQuery.matches) return;

            var text = document.getElementById("dvdText");
            if (!text) return;

            var x = 140;
            var y = 120;
            var dx = 2.6;
            var dy = 2.1;
            var angle = 0;

            function getBounds() {
                return text.getBoundingClientRect();
            }

            function applyPosition() {
                text.style.transform = "translate(" + x + "px, " + y + "px) rotate(" + angle + "deg)";
            }

            function clampIntoView() {
                applyPosition();

                var rect = getBounds();

                if (rect.left < 0) {
                    x += -rect.left;
                }
                if (rect.top < 0) {
                    y += -rect.top;
                }
                if (rect.right > window.innerWidth) {
                    x -= (rect.right - window.innerWidth);
                }
                if (rect.bottom > window.innerHeight) {
                    y -= (rect.bottom - window.innerHeight);
                }

                applyPosition();
            }

            function animate() {
                x += dx;
                y += dy;

                applyPosition();

                var rect = getBounds();

                if (rect.left <= 0 && dx < 0) {
                    dx = Math.abs(dx);
                } else if (rect.right >= window.innerWidth && dx > 0) {
                    dx = -Math.abs(dx);
                }

                if (rect.top <= 0 && dy < 0) {
                    dy = Math.abs(dy);
                } else if (rect.bottom >= window.innerHeight && dy > 0) {
                    dy = -Math.abs(dy);
                }

                requestAnimationFrame(animate);
            }

            window.addEventListener("resize", clampIntoView);
            window.addEventListener("orientationchange", clampIntoView);

            clampIntoView();
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
